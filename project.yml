name: FoodReflect
options:
  bundleIdPrefix: com.bjoernnnn.foodreflect
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  CalorieCore:
    path: CalorieCore

targets:
  FoodReflect:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
        excludes:
          - "Info.plist"
          - "FoodReflect.entitlements"
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: FoodReflect
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Zum Scannen von Barcodes, um Lebensmittel schnell zu erfassen."
    entitlements:
      path: App/FoodReflect.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bjoernnnn.foodreflect
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bjoernnnn.foodreflect
        SWIFT_VERSION: 5.10
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: CalorieCore
        product: Domain
      - package: CalorieCore
        product: Data
      - package: CalorieCore
        product: DesignSystem
      - package: CalorieCore
        product: FeatureDashboard
      - package: CalorieCore
        product: FeatureHistory
      - package: CalorieCore
        product: FeatureLog
      - package: CalorieCore
        product: FeatureMeals
      - package: CalorieCore
        product: FeatureScanner
      - package: CalorieCore
        product: FeatureSettings
      - package: CalorieCore
        product: FeatureWeight
      - target: Widget
        embed: true
      - target: FoodReflectWatch
        embed: true

  Widget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Widget
        excludes:
          - "Info.plist"
          - "Widget.entitlements"
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: FoodReflect
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widget/Widget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bjoernnnn.foodreflect
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bjoernnnn.foodreflect.Widget
        SWIFT_VERSION: 5.10
        SWIFT_STRICT_CONCURRENCY: complete
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: true
    dependencies:
      - package: CalorieCore
        product: Domain
      - package: CalorieCore
        product: Data
      - package: CalorieCore
        product: DesignSystem

  FoodReflectWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: FoodReflectWatch
        excludes:
          - "Info.plist"
          - "FoodReflectWatch.entitlements"
    info:
      path: FoodReflectWatch/Info.plist
      properties:
        CFBundleDisplayName: FoodReflect
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.bjoernnnn.foodreflect
        CFBundleURLTypes:
          - CFBundleURLName: com.bjoernnnn.foodreflect.watch
            CFBundleURLSchemes:
              - foodreflect
    entitlements:
      path: FoodReflectWatch/FoodReflectWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bjoernnnn.foodreflect.watch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bjoernnnn.foodreflect.watchkitapp
        SWIFT_VERSION: 5.10
        SWIFT_STRICT_CONCURRENCY: complete
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "4"
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - package: CalorieCore
        product: Domain
      - target: FoodReflectWatchWidgets
        embed: true

  FoodReflectWatchWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: FoodReflectWatchWidgets
        excludes:
          - "Info.plist"
          - "FoodReflectWatchWidgets.entitlements"
    info:
      path: FoodReflectWatchWidgets/Info.plist
      properties:
        CFBundleDisplayName: FoodReflect
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: FoodReflectWatchWidgets/FoodReflectWatchWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bjoernnnn.foodreflect.watch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bjoernnnn.foodreflect.watchkitapp.widgets
        SWIFT_VERSION: 5.10
        SWIFT_STRICT_CONCURRENCY: complete
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "4"
        SKIP_INSTALL: true

  FoodReflectUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FoodReflectUITests
    settings:
      base:
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: FoodReflect
    dependencies:
      - target: FoodReflect

schemes:
  FoodReflect:
    build:
      targets:
        FoodReflect: all
        FoodReflectUITests: [test]
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - FoodReflectUITests
    run:
      config: Debug
  FoodReflectWatch:
    build:
      targets:
        FoodReflectWatch: all
        FoodReflectWatchWidgets: all
    run:
      config: Debug
