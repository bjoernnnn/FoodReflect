name: KalorienTracker
options:
  bundleIdPrefix: com.bjoernnnn.foodreflect
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  CalorieCore:
    path: CalorieCore

targets:
  KalorienTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
        excludes:
          - "Info.plist"
          - "KalorienTracker.entitlements"
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Zum Scannen von Barcodes, um Lebensmittel schnell zu erfassen."
    entitlements:
      path: App/KalorienTracker.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bjoernnnn.foodreflect
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bjoernnnn.foodreflect
        SWIFT_VERSION: 5.10
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: CalorieCore
        product: Domain
      - package: CalorieCore
        product: Data
      - package: CalorieCore
        product: DesignSystem
      - package: CalorieCore
        product: FeatureDashboard
      - package: CalorieCore
        product: FeatureLog
      - package: CalorieCore
        product: FeatureScanner
      - package: CalorieCore
        product: FeatureSettings
      - target: Widget
        embed: true

  Widget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Widget
        excludes:
          - "Info.plist"
          - "Widget.entitlements"
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Kalorien-Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widget/Widget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bjoernnnn.foodreflect
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bjoernnnn.foodreflect.Widget
        SWIFT_VERSION: 5.10
        SWIFT_STRICT_CONCURRENCY: complete
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: true
    dependencies:
      - package: CalorieCore
        product: Domain
      - package: CalorieCore
        product: Data
      - package: CalorieCore
        product: DesignSystem

  KalorienTrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KalorienTrackerUITests
    settings:
      base:
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: KalorienTracker
    dependencies:
      - target: KalorienTracker

schemes:
  KalorienTracker:
    build:
      targets:
        KalorienTracker: all
        KalorienTrackerUITests: [test]
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - KalorienTrackerUITests
    run:
      config: Debug
