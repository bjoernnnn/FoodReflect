name: KalorienTracker
options:
  bundleIdPrefix: com.bjoernnnn.foodreflect
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  CalorieCore:
    path: CalorieCore

targets:
  KalorienTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
        excludes:
          - "Info.plist"
          - "KalorienTracker.entitlements"
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: App/KalorienTracker.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bjoernnnn.foodreflect
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bjoernnnn.foodreflect
        SWIFT_VERSION: 5.10
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: true
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: CalorieCore
        product: Domain
      - package: CalorieCore
        product: Data
      - package: CalorieCore
        product: DesignSystem
      - package: CalorieCore
        product: FeatureDashboard
      - package: CalorieCore
        product: FeatureLog
      - package: CalorieCore
        product: FeatureScanner
      - package: CalorieCore
        product: FeatureSettings

schemes:
  KalorienTracker:
    build:
      targets:
        KalorienTracker: all
    test:
      config: Debug
      gatherCoverageData: true
    run:
      config: Debug
