included:
  - App
  - CalorieCore/Sources
  - CalorieCore/Tests

excluded:
  - CalorieCore/.build
  - .build
  - DerivedData

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - unneeded_parentheses_in_closure_argument
  - redundant_type_annotation

disabled_rules:
  - todo

line_length:
  warning: 130
  error: 160

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y
